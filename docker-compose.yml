services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aside}
      POSTGRES_USER: ${POSTGRES_USER:-aside}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aside_dev_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aside}"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aside}:${POSTGRES_PASSWORD:-aside_dev_password}@db:5432/${POSTGRES_DB:-aside}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./package.json:/app/package.json
      - ./uploads:/app/uploads

  test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aside}:${POSTGRES_PASSWORD:-aside_dev_password}@db:5432/${POSTGRES_DB:-aside}_test
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-aside-media}-test
      NODE_ENV: test
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    command: npm test
    profiles:
      - test

volumes:
  pgdata:
