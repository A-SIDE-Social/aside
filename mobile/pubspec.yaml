name: aside
description: "A/SIDE — private photo + video + DM social for the friends who actually know you."
publish_to: 'none'
version: 1.3.3+50

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^17.2.2

  # Networking
  dio: ^5.8.0

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.3

  # Media
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  image_picker: ^1.1.2
  video_player: ^2.9.2
  flutter_image_compress: ^2.3.0
  video_compress: ^3.1.3
  photo_view: ^0.15.0
  # 1.2: emoji picker for post reactions. Bundles a full Unicode
  # emoji grid + searchable categories. iOS has no public API to
  # force the system emoji keyboard from Dart, so a package is the
  # right primitive (the alternative — a hidden auto-focused
  # TextField — only opens the user's last keyboard, not necessarily
  # emoji).
  emoji_picker_flutter: ^4.3.0

  # Firebase
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0

  # Real-time
  socket_io_client: ^3.0.2

  # Subscriptions
  purchases_flutter: ^10.0.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0
  share_plus: ^12.0.2
  cupertino_icons: ^1.0.8
  package_info_plus: ^8.2.1
  pin_code_fields: ^8.0.1
  crypto: ^3.0.6

  aside_crypto:
    path: rust_builder
  flutter_rust_bridge: 2.12.0

  # Personal invite links: Universal Links (iOS) + App Links (Android)
  # abstraction. Surfaces incoming invite-link taps as a Dart stream,
  # regardless of platform.
  app_links: ^6.3.2

  # QR code rendering for the share-invite-link surface.
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4
  mocktail: ^1.0.4
  fake_async: ^1.3.2

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
    - assets/grain.png

  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Regular.ttf
          weight: 400
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Geist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Geist-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "../assets/icon_app_1024.png"
  adaptive_icon_foreground: "../assets/icon_adaptive_foreground.png"
  adaptive_icon_background: "#2f3b49"

flutter_native_splash:
  image: "../assets/splash_logo.png"
  color: "#FAFAFA"
  color_dark: "#0A0A0A"
  android_12:
    image: "../assets/splash_logo.png"
    color: "#FAFAFA"
    color_dark: "#0A0A0A"
